<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무보고 작성기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','맑은 고딕','Apple SD Gothic Neo',sans-serif;background:#F4F3EF;color:#1A2744;min-height:100vh}

/* Header */
header{background:#1A2744;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(26,39,68,.25)}
.header-inner{max-width:1000px;margin:0 auto;padding:0 20px;height:54px;display:flex;align-items:center;justify-content:space-between}
.logo{color:#fff;font-size:18px;font-weight:800;letter-spacing:-.5px}
.logo span{color:#E8704A;margin-right:6px}
.sync-badge{font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px}
.sync-ok{background:#1f3d2a;color:#4ade80}
.sync-err{background:#3d1f1f;color:#f87171}
.sync-ing{background:#1f2d3d;color:#93c5fd}
.sync-none{background:#2d2a1f;color:#fbbf24}
.tabs{display:flex;gap:4px}
.tab{background:transparent;border:none;padding:8px 14px;border-radius:6px;color:rgba(255,255,255,.4);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.tab.active{background:#E8704A;color:#fff}
.tab:hover:not(.active){color:rgba(255,255,255,.7)}

/* Layout */
main{max-width:1000px;margin:0 auto;padding:24px 16px 60px}
.section{display:flex;flex-direction:column;gap:16px}
.hidden{display:none}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;flex-wrap:wrap;gap:10px}
.page-title{font-size:22px;font-weight:800;letter-spacing:-.5px}
.action-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

/* Buttons */
.btn{border:none;border-radius:8px;padding:9px 18px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-navy{background:#1A2744;color:#fff}.btn-navy:hover{background:#2a3d6b}
.btn-green{background:#217346;color:#fff}.btn-green:hover{background:#1a5c38}
.btn-save{background:#2E7D4F;color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-save:hover{background:#236039}
.btn-copy{background:#1A2744;color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-copy.copied{background:#2E7D4F}
.btn-sm{background:transparent;color:#bbb;border:none;cursor:pointer;font-size:14px;padding:2px 5px;border-radius:4px;font-weight:700;font-family:inherit}
.btn-sm:hover{color:#E8704A}
.btn-sm-o{background:transparent;color:#bbb;border:1px solid #ddd;cursor:pointer;font-size:11px;padding:3px 8px;border-radius:5px;font-weight:600;font-family:inherit}
.btn-sm-o:hover{color:#E8704A;border-color:#E8704A}
.btn-rm-proj{background:transparent;color:#E8704A;border:1px solid #E8704A;cursor:pointer;font-size:12px;padding:4px 10px;border-radius:6px;font-weight:700;font-family:inherit}
.btn-rm-proj:hover{background:#fff5f2}
.btn-dash{background:transparent;color:#E8704A;border:1.5px dashed #E8C4B8;border-radius:6px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;margin-top:8px;font-family:inherit;display:inline-block}
.btn-dash:hover{background:#fff5f2}
.btn-dash.navy{border-color:#9aadce;color:#1A2744}.btn-dash.navy:hover{background:#f0f4fb}
.btn-block-add{background:#1A2744;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:13px;cursor:pointer;font-weight:700;margin-top:10px;font-family:inherit}
.btn-add-proj{background:#1A2744;color:#fff;border:none;border-radius:10px;padding:14px 24px;font-size:15px;cursor:pointer;font-weight:700;width:100%;font-family:inherit}
.btn-add-proj:hover{background:#2a3d6b}

/* Card */
.card{background:#fff;border-radius:12px;box-shadow:0 1px 6px rgba(26,39,68,.07);overflow:hidden}
.card-label{padding:12px 20px 10px;font-size:11px;font-weight:800;color:#999;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid #EEECE6;display:flex;align-items:center;justify-content:space-between}
.card-body{padding:20px}

/* Inputs */
.date-input{border:1.5px solid #D4D1C8;border-radius:8px;padding:7px 10px;font-size:14px;background:#fff;color:#1A2744;outline:none;font-family:inherit}
.th-input{border:none;background:transparent;text-align:center;font-weight:700;font-size:13px;outline:none;color:#1A2744;font-family:inherit;width:100%}
.num-input{width:50px;border:none;border-bottom:1.5px solid #C8C5BC;text-align:center;font-size:14px;outline:none;background:transparent;color:#1A2744;padding:2px 0;font-family:inherit}
.h-unit{font-size:12px;color:#999;margin-left:2px}
.total-cell{font-weight:800;color:#E8704A;font-size:15px}
.time-in{border:1.5px solid #D4D1C8;border-radius:6px;padding:5px 8px;font-size:14px;background:#fff;color:#1A2744;outline:none;font-family:inherit;width:125px}
.note-in{border:1.5px solid #D4D1C8;border-radius:6px;padding:6px 10px;font-size:13px;background:#fff;color:#666;outline:none;flex:1;min-width:150px;font-family:inherit}
.proj-sel{border:1.5px solid #D4D1C8;border-radius:6px;padding:5px 8px;font-size:13px;background:#fff;color:#1A2744;outline:none;min-width:135px;cursor:pointer;font-family:inherit}
.task-in{flex:1;border:1.5px solid #D4D1C8;border-radius:6px;padding:6px 10px;font-size:13px;background:#fff;color:#1A2744;outline:none;font-family:inherit}
.meta-in{border:1.5px solid #D4D1C8;border-radius:6px;padding:5px 10px;font-size:13px;background:#fff;color:#1A2744;outline:none;width:160px;font-family:inherit}
.wide-in{border:1.5px solid #D4D1C8;border-radius:6px;padding:6px 10px;font-size:13px;background:#fff;color:#1A2744;outline:none;width:100%;display:block;font-family:inherit}
.item-in{flex:1;border:1.5px solid #D4D1C8;border-radius:6px;padding:6px 10px;font-size:13px;background:#fff;color:#1A2744;outline:none;font-family:inherit}
.proj-name-in{border:none;background:transparent;font-weight:800;font-size:14px;color:#1A2744;outline:none;font-family:inherit;flex:1;min-width:0}
.sec-title-in{border:none;background:transparent;font-weight:700;font-size:14px;color:#1A2744;outline:none;flex:1;font-family:inherit}
input:focus,select:focus{border-color:#1A2744!important}

/* Tables */
.proj-table{border-collapse:collapse;width:100%;font-size:14px;min-width:400px}
.proj-table th{background:#F4F3EF;padding:9px 12px;text-align:center;font-weight:700;border:1px solid #E4E2DA;font-size:13px}
.proj-table td{padding:8px 12px;text-align:center;border:1px solid #E4E2DA}

/* Block */
.block{background:#FAFAF8;border-radius:8px;padding:14px;border:1px solid #E8E6DF}
.block-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.time-group{display:flex;align-items:center;gap:4px}
.tilde{color:#aaa;font-weight:700;margin:0 2px}
.h-chip{background:#E8704A;color:#fff;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:800}
.task-list{display:flex;flex-direction:column;gap:6px}
.task-row{display:flex;gap:8px;align-items:center}

/* Weekly */
.sec-block{background:#F8F7F3;border-radius:8px;padding:12px 14px;border-left:3px solid #1A2744;margin-bottom:10px}
.sec-head{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.sec-star{color:#E8704A;font-weight:900;font-size:16px;flex-shrink:0}
.item-row{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.item-dash{color:#aaa;font-size:12px;flex-shrink:0}
.meta-row{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.meta-lbl{font-size:12px;color:#888;font-weight:700;flex-shrink:0}

/* Tracking */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.stat-card{background:#fff;border-radius:12px;padding:16px 20px;box-shadow:0 1px 6px rgba(26,39,68,.07);text-align:center}
.stat-val{font-size:28px;font-weight:800;color:#1A2744;letter-spacing:-.5px}
.stat-lbl{font-size:12px;color:#999;font-weight:600;margin-top:4px}
.stat-card.acc .stat-val{color:#E8704A}
.bar-chart{display:flex;flex-direction:column;gap:10px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-label{font-size:13px;font-weight:600;color:#1A2744;width:150px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;background:#F4F3EF;border-radius:4px;height:20px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .4s;display:flex;align-items:center;padding-left:6px}
.bar-val{font-size:11px;font-weight:800;color:#fff;white-space:nowrap}
.hist-list{display:flex;flex-direction:column;gap:8px}
.hist-item{background:#fff;border-radius:10px;padding:14px 16px;box-shadow:0 1px 4px rgba(26,39,68,.06);cursor:pointer;border-left:4px solid transparent}
.hist-item:hover{box-shadow:0 2px 10px rgba(26,39,68,.12)}
.hist-item.d-item{border-left-color:#E8704A}
.hist-item.w-item{border-left-color:#1A2744}
.hist-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.hist-date{font-size:15px;font-weight:700}
.hist-badges{display:flex;gap:6px;flex-wrap:wrap}
.badge{font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap}
.bd-o{background:#FFF0EC;color:#E8704A}
.bd-n{background:#EEF1F8;color:#1A2744}
.bd-g{background:#EDF7F2;color:#2E7D4F}
.hist-detail{margin-top:10px;padding-top:10px;border-top:1px solid #F0EEE8;display:none}
.hist-detail.open{display:block}
.whist-item{font-size:13px;color:#666;margin-left:8px}
.whist-proj-name{font-size:14px;font-weight:800;color:#1A2744;margin-bottom:4px;margin-top:8px}
.whist-sec-title{font-size:13px;font-weight:700;color:#555;margin-left:8px}
.month-nav{display:flex;align-items:center;gap:8px}
.month-nav button{background:#fff;border:1.5px solid #D4D1C8;border-radius:6px;padding:6px 10px;cursor:pointer;font-size:14px;color:#1A2744;font-family:inherit}
.month-nav button:hover{background:#F4F3EF}
.month-label{font-size:16px;font-weight:800;min-width:90px;text-align:center}
.empty-state{text-align:center;padding:48px 20px;color:#bbb}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-text{font-size:16px;font-weight:600}
.empty-sub{font-size:13px;margin-top:6px}

/* Misc */
.flex-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.overflow-x{overflow-x:auto}
.mt-6{margin-top:6px}
.sec-title-trk{font-size:15px;font-weight:800;margin-bottom:10px}

/* Toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1A2744;color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:700;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.2);transition:opacity .3s;pointer-events:none}
.toast.hide{opacity:0}
</style>
</head>
<body>

<div id="toast" class="toast hide"></div>

<header>
  <div class="header-inner">
    <div class="logo"><span>●</span>업무보고</div>
    <div style="display:flex;align-items:center;gap:10px">
      <span id="sync-badge" class="sync-badge sync-none">💾 로컬 저장</span>
      <div class="tabs">
        <button class="tab active" onclick="switchTab('daily')">일일 보고</button>
        <button class="tab" onclick="switchTab('weekly')">주간 보고</button>
        <button class="tab" onclick="switchTab('track')">📊 기록 트래킹</button>
      </div>
    </div>
  </div>
</header>

<main>
  <!-- Daily -->
  <div id="daily-section" class="section">
    <div class="page-header">
      <div class="page-title">일일 업무보고</div>
      <div class="action-bar">
        <input type="date" id="daily-date" class="date-input" onchange="state.daily.date=this.value;autoSave()">
        <button class="btn-copy" id="copy-btn" onclick="copyDaily()">📋 텍스트 복사</button>
        <button class="btn btn-green" onclick="exportDailyExcel()">📊 엑셀</button>
        <button class="btn-save" onclick="saveDailyRecord()">💾 기록 저장</button>
      </div>
    </div>
    <div id="daily-content"></div>
  </div>

  <!-- Weekly -->
  <div id="weekly-section" class="section hidden">
    <div class="page-header">
      <div class="page-title">주간 업무보고</div>s
      <div class="action-bar">
        <button class="btn-copy" id="wcopy-btn" onclick="copyWeekly()">📋 텍스트 복사</button>
        <button class="btn btn-green" onclick="exportWeeklyExcel()">📊 엑셀</button>
        <button class="btn-save" onclick="saveWeeklyRecord()">💾 기록 저장</button>
      </div>
    </div>
    <div id="weekly-content"></div>
  </div>

  <!-- Track -->
  <div id="track-section" class="section hidden">
    <div class="page-header">
      <div class="page-title">기록 트래킹</div>
      <div class="action-bar">
        <button class="btn btn-green" onclick="exportTrackExcel()">📊 월간 엑셀</button>
      </div>
    </div>
    <div id="track-content"></div>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ▼▼▼ Google Sheets Apps Script URL을 아래에 입력하세요 ▼▼▼
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyBzo-gQRJ9saxxMMKNVjpQlI-ZtWSrIuNjCZk-NwM5ngJ3ulmd1XnUxGYgbmIuloE3Dw/exec';
// ▲▲▲ 예: 'https://script.google.com/macros/s/XXXXX/exec' ▲▲▲

/* ── State ── */
let _uid = 200;
const nid = () => ++_uid;

function defaultDaily() {
  return {
    date: new Date().toISOString().split('T')[0],
    projects: [
      {id:1,name:'메타그린 슬림업',dh:0,mh:0},
      {id:2,name:'메타그린 더블컷',dh:0,mh:0}
    ],
    blocks: [
      {id:1,start:'09:30',end:'12:00',tasks:[{pi:0,content:''}],note:'점심 시간'},
      {id:2,start:'13:00',end:'18:30',tasks:[{pi:0,content:''},{pi:1,content:''}],note:''}
    ],
    tomorrow:[{pi:0,content:''},{pi:1,content:''}]
  };
}
function defaultWeekly() { return {weekLabel:'',projects:[]}; }
function loadLS(k,fb){ try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;} }

let state = {
  daily:   loadLS('wr-daily',  defaultDaily()),
  weekly:  loadLS('wr-weekly', defaultWeekly()),
  dailyH:  loadLS('wr-dailyH', []),
  weeklyH: loadLS('wr-weeklyH',[]),
};
let trackYM = {y:new Date().getFullYear(), m:new Date().getMonth()};
let _saveTimer;

/* ── Helpers ── */
function calcH(s,e){
  if(!s||!e) return 0;
  const [sh,sm]=s.split(':').map(Number), [eh,em]=e.split(':').map(Number);
  const d=(eh*60+em)-(sh*60+sm);
  return d>0 ? Math.round(d/60*10)/10 : 0;
}
function esc(v){return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function totalDH(r){return r.projects.reduce((s,p)=>s+(parseFloat(p.dh)||0),0);}
const COLORS=['#E8704A','#1A2744','#2E7D6F','#7B68EE','#D4A017','#4A7C8A'];
const projColor=i=>COLORS[i%COLORS.length];

/* ── Toast ── */
let _toastT;
function toast(msg,err){
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.background=err?'#c0392b':'#1A2744';
  el.classList.remove('hide'); clearTimeout(_toastT);
  _toastT=setTimeout(()=>el.classList.add('hide'),2500);
}

/* ── Sync Status ── */
function setSyncStatus(s){
  const el=document.getElementById('sync-badge');
  const map={ok:['sync-ok','✅ 연동됨'],err:['sync-err','❌ 연동 오류'],ing:['sync-ing','🔄 동기화 중'],none:['sync-none','💾 로컬 저장']};
  const [cls,txt]=map[s]||map.none;
  el.className='sync-badge '+cls; el.textContent=txt;
}

/* ── Google Sheets API ── */
async function apiGet(){
  if(!SCRIPT_URL) return null;
  setSyncStatus('ing');
  try{
    const res=await fetch(SCRIPT_URL);
    const data=await res.json();
    setSyncStatus('ok');
    return data;
  }catch(e){
    setSyncStatus('err');
    return null;
  }
}

async function apiPost(body){
  if(!SCRIPT_URL) return;
  try{
    await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(body)});
    setSyncStatus('ok');
  }catch(e){
    setSyncStatus('err');
  }
}

/* ── Local Save + debounced sync ── */
function saveLS(){
  localStorage.setItem('wr-daily',  JSON.stringify(state.daily));
  localStorage.setItem('wr-weekly', JSON.stringify(state.weekly));
  localStorage.setItem('wr-dailyH', JSON.stringify(state.dailyH));
  localStorage.setItem('wr-weeklyH',JSON.stringify(state.weeklyH));
}

function autoSave(){
  saveLS();
  if(!SCRIPT_URL) return;
  clearTimeout(_saveTimer);
  setSyncStatus('ing');
  _saveTimer=setTimeout(()=>{
    apiPost({action:'save_current',daily:state.daily,weekly:state.weekly});
  },2000);
}

/* ── Load from Sheets ── */
async function loadFromSheets(){
  if(!SCRIPT_URL) return;
  setSyncStatus('ing');
  const data=await apiGet();
  if(data){
    if(data.current?.daily)  state.daily  = data.current.daily;
    if(data.current?.weekly) state.weekly = data.current.weekly;
    if(data.dailyH?.length)  state.dailyH = data.dailyH;
    if(data.weeklyH?.length) state.weeklyH= data.weeklyH;
    saveLS();
    toast('✅ Google Sheets에서 데이터를 불러왔습니다');
  }
  state.daily.date = new Date().toISOString().split('T')[0];
  renderDaily();
}

/* ── Tab ── */
function switchTab(t){
  ['daily','weekly','track'].forEach(id=>{
    document.getElementById(id+'-section').classList.toggle('hidden',id!==t);
  });
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active',['daily','weekly','track'][i]===t);
  });
  if(t==='track') renderTrack();
}

/* ── Daily Render ── */
function renderDaily(){
  const d=state.daily;
  document.getElementById('daily-date').value=d.date;

  const projCols=d.projects.map((p,i)=>`
    <th style="min-width:120px">
      <div style="display:flex;align-items:center;gap:4px;justify-content:center">
        <input class="th-input" value="${esc(p.name)}"
          oninput="state.daily.projects[${i}].name=this.value;autoSave()"
          onchange="renderDaily()">
        <button class="btn-sm" onclick="removeProject(${i})">×</button>
      </div>
    </th>`).join('');

  const makeRow=(label,key)=>{
    const total=d.projects.reduce((s,p)=>s+(parseFloat(p[key])||0),0);
    const cells=d.projects.map((p,i)=>`
      <td>
        <input class="num-input" type="number" min="0" step="0.5" value="${p[key]||0}"
          oninput="state.daily.projects[${i}].${key}=parseFloat(this.value)||0;updateTotals('${key}');autoSave()">
        <span class="h-unit">h</span>
      </td>`).join('');
    return `<tr><td style="font-weight:700">${label}</td>${cells}<td class="total-cell" id="tot-${key}">${total}h</td></tr>`;
  };

  const opts=selPi=>d.projects.map((p,pi)=>`<option value="${pi}"${selPi===pi?' selected':''}>${esc(p.name)}</option>`).join('');

  const blocksHtml=d.blocks.map((b,bi)=>{
    const h=calcH(b.start,b.end);
    const tasks=b.tasks.map((t,ti)=>`
      <div class="task-row">
        <select class="proj-sel" onchange="state.daily.blocks[${bi}].tasks[${ti}].pi=parseInt(this.value);autoSave()">${opts(t.pi)}</select>
        <input class="task-in" placeholder="업무 내용" value="${esc(t.content)}"
          oninput="state.daily.blocks[${bi}].tasks[${ti}].content=this.value;autoSave()">
        <button class="btn-sm" onclick="removeTask(${bi},${ti})">×</button>
      </div>`).join('');
    return `
      <div class="block">
        <div class="block-top">
          <div class="time-group">
            <input type="time" class="time-in" value="${b.start}"
              onchange="state.daily.blocks[${bi}].start=this.value;autoSave();updateChip(${bi})">
            <span class="tilde">~</span>
            <input type="time" class="time-in" value="${b.end}"
              onchange="state.daily.blocks[${bi}].end=this.value;autoSave();updateChip(${bi})">
            <span class="h-chip${h===0?' hidden':''}" id="chip-${bi}">${h>0?h+'h':''}</span>
          </div>

/* ── Save Records ── */
async function saveDailyRecord(){
  const d=JSON.parse(JSON.stringify(state.daily));
  const idx=state.dailyH.findIndex(r=>r.date===d.date);
  if(idx>=0){if(!confirm(`${d.date} 기록이 이미 있습니다. 덮어쓰시겠습니까?`))return; state.dailyH[idx]=d;}
  else{state.dailyH.push(d); state.dailyH.sort((a,b)=>a.date<b.date?1:-1);}
  saveLS();
  await apiPost({action:'save_daily_record',key:d.date,data:d});
  toast(`✅ ${d.date} 일일 보고 저장 완료`);
}

async function saveWeeklyRecord(){
  const w=JSON.parse(JSON.stringify(state.weekly));
  if(!w.weekLabel.trim()){toast('주차 정보를 먼저 입력해주세요',true);return;}
  const idx=state.weeklyH.findIndex(r=>r.weekLabel===w.weekLabel);
  if(idx>=0){if(!confirm(`"${w.weekLabel}" 기록이 이미 있습니까? 덮어쓰시겠습니까?`))return; state.weeklyH[idx]=w;}
  else state.weeklyH.unshift(w);
  saveLS();
  await apiPost({action:'save_weekly_record',key:w.weekLabel,data:w});
  toast(`✅ ${w.weekLabel} 주간 보고 저장 완료`);
}

/* ── Tracking ── */
function renderTrack(){
  const {y,m}=trackYM, monthName=`${y}년 ${m+1}월`;
  const prefix=`${y}-${String(m+1).padStart(2,'0')}`;
  const dayRecs=state.dailyH.filter(r=>r.date.startsWith(prefix));
  const totalH=dayRecs.reduce((s,r)=>s+totalDH(r),0);
  const projMap={};
  dayRecs.forEach(r=>r.projects.forEach(p=>{if(!projMap[p.name])projMap[p.name]=0;projMap[p.name]+=parseFloat(p.dh)||0;}));
  const projEntries=Object.entries(projMap).sort((a,b)=>b[1]-a[1]);
  const maxPH=projEntries.length?projEntries[0][1]:1;

  const barChart=projEntries.length===0
    ?'<div style="color:#bbb;font-size:13px">이 달 저장된 기록이 없습니다</div>'
    :projEntries.map(([name,h],idx)=>{
      const pct=Math.round(h/maxPH*100),color=projColor(idx),label=`${Math.round(h*10)/10}h`;
      return `<div class="bar-row">
        <div class="bar-label" title="${esc(name)}">${esc(name)}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}">
          ${pct>20?`<span class="bar-val">${label}</span>`:''}
        </div></div>
        ${pct<=20?`<span style="font-size:12px;color:#666;font-weight:700;flex-shrink:0">${label}</span>`:''}
      </div>`;}).join('');

  const dayListHtml=dayRecs.length===0
    ?`<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">이 달 저장된 일일 보고가 없습니다</div><div class="empty-sub">일일 보고 작성 후 <strong>💾 기록 저장</strong>을 눌러주세요</div></div>`
    :dayRecs.map((r,idx)=>{
      const h=totalDH(r);
      const projBadges=r.projects.filter(p=>p.dh>0).map((p,i)=>`<span class="badge" style="background:${projColor(i)}22;color:${projColor(i)}">${esc(p.name)} ${p.dh}h</span>`).join('');
      const blockDetail=r.blocks.map(b=>{const bh=calcH(b.start,b.end);const tasks=b.tasks.filter(t=>t.content).map(t=>`[${r.projects[t.pi]?.name||''}] ${t.content}`).join(' / ');return tasks?`<div class="whist-item">• ${b.start}~${b.end}(${bh}h) ${tasks}</div>`:''}).join('');
      return `<div class="hist-item d-item" onclick="toggleDetail(this)">
        <div class="hist-top">
          <div class="hist-date">${r.date}</div>
          <div class="hist-badges"><span class="badge bd-o">총 ${h}h</span>${projBadges}</div>
        </div>
        <div class="hist-detail">
          ${blockDetail||'<div style="color:#bbb;font-size:13px">업무 내용 없음</div>'}
          <div style="margin-top:8px;display:flex;gap:8px">
            <button class="btn btn-navy" style="padding:6px 12px;font-size:12px" onclick="event.stopPropagation();loadDailyRec(${idx})">불러오기</button>
            <button class="btn" style="padding:6px 12px;font-size:12px;background:#fdf2f2;color:#c0392b;border:1px solid #e8b0b0" onclick="event.stopPropagation();deleteDailyRec('${r.date}')">삭제</button>
          </div>
        </div>
      </div>`;}).join('');

  const wkListHtml=state.weeklyH.length===0
    ?`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">저장된 주간 보고가 없습니다</div></div>`
    :state.weeklyH.map((r,idx)=>{
      const pn=(r.projects||[]).map(p=>p.name).join(', ');
      const detail=(r.projects||[]).map(p=>{const secs=(p.sections||[]).map(s=>{const items=s.items.filter(i=>i.trim()).map(i=>`<div class="whist-item">- ${esc(i)}</div>`).join('');return items?`<div><div class="whist-sec-title">* ${esc(s.title)}</div>${items}</div>`:''}).join('');return secs?`<div class="whist-proj-name">${esc(p.name)}</div>${secs}`:''}).join('');
      return `<div class="hist-item w-item" onclick="toggleDetail(this)">
        <div class="hist-top">
          <div class="hist-date">${esc(r.weekLabel)} 주</div>
          <div class="hist-badges"><span class="badge bd-n">프로젝트 ${(r.projects||[]).length}건</span><span class="badge bd-g">${esc(pn.substring(0,40))}${pn.length>40?'...':''}</span></div>
        </div>
        <div class="hist-detail">
          ${detail||'<div style="color:#bbb;font-size:13px">내용 없음</div>'}
          <div style="margin-top:8px;display:flex;gap:8px">
            <button class="btn btn-navy" style="padding:6px 12px;font-size:12px" onclick="event.stopPropagation();loadWeeklyRec(${idx})">불러오기</button>
            <button class="btn" style="padding:6px 12px;font-size:12px;background:#fdf2f2;color:#c0392b;border:1px solid #e8b0b0" onclick="event.stopPropagation();deleteWeeklyRec('${esc(r.weekLabel)}')">삭제</button>
          </div>
        </div>
      </div>`;}).join('');

  document.getElementById('track-content').innerHTML=`
    <div class="card">
      <div class="card-label"><span>📅 월간 요약</span></div>
      <div class="card-body">
        <div class="flex-row" style="margin-bottom:16px">
          <div class="month-nav">
            <button onclick="changeMonth(-1)">‹</button>
            <div class="month-label">${monthName}</div>
            <button onclick="changeMonth(1)">›</button>
          </div>
        </div>
        <div class="stats-grid" style="margin-bottom:20px">
          <div class="stat-card acc"><div class="stat-val">${dayRecs.length}</div><div class="stat-lbl">근무 기록일</div></div>
          <div class="stat-card"><div class="stat-val">${Math.round(totalH*10)/10}h</div><div class="stat-lbl">월 총 근무시간</div></div>
          <div class="stat-card"><div class="stat-val">${dayRecs.length>0?Math.round(totalH/dayRecs.length*10)/10:0}h</div><div class="stat-lbl">일 평균 근무시간</div></div>
          <div class="stat-card"><div class="stat-val">${projEntries.length}</div><div class="stat-lbl">활성 프로젝트</div></div>
        </div>
        <div class="sec-title-trk">프로젝트별 시간</div>
        <div class="bar-chart">${barChart}</div>
      </div>
    </div>
    <div class="card">
      <div class="card-label"><span>📅 ${monthName} 일일 기록 (${dayRecs.length}건)</span></div>
      <div class="card-body" style="padding:12px 16px"><div class="hist-list">${dayListHtml}</div></div>
    </div>
    <div class="card">
      <div class="card-label"><span>📋 전체 주간 기록 (${state.weeklyH.length}건)</span></div>
      <div class="card-body" style="padding:12px 16px"><div class="hist-list">${wkListHtml}</div></div>
    </div>`;
}

function changeMonth(d){trackYM.m+=d;if(trackYM.m>11){trackYM.m=0;trackYM.y++;}if(trackYM.m<0){trackYM.m=11;trackYM.y--;}renderTrack();}
function toggleDetail(el){el.querySelector('.hist-detail').classList.toggle('open');}

function loadDailyRec(idx){
  const prefix=`${trackYM.y}-${String(trackYM.m+1).padStart(2,'0')}`;
  const recs=state.dailyH.filter(r=>r.date.startsWith(prefix));
  state.daily=JSON.parse(JSON.stringify(recs[idx]));
  saveLS();renderDaily();switchTab('daily');toast('✅ 일일 보고를 불러왔습니다');
}
function loadWeeklyRec(idx){
  state.weekly=JSON.parse(JSON.stringify(state.weeklyH[idx]));
  saveLS();renderWeekly();switchTab('weekly');toast('✅ 주간 보고를 불러왔습니다');
}
async function deleteDailyRec(date){
  if(!confirm(`${date} 기록을 삭제하시겠습니까?`))return;
  const i=state.dailyH.findIndex(r=>r.date===date);
  if(i>=0) state.dailyH.splice(i,1);
  saveLS();await apiPost({action:'delete_daily',key:date});renderTrack();toast('🗑 삭제되었습니다');
}
async function deleteWeeklyRec(label){
  if(!confirm(`"${label}" 주간 기록을 삭제하시겠습니까?`))return;
  const i=state.weeklyH.findIndex(r=>r.weekLabel===label);
  if(i>=0) state.weeklyH.splice(i,1);
  saveLS();await apiPost({action:'delete_weekly',key:label});renderTrack();toast('🗑 삭제되었습니다');
}

/* ── Copy ── */
function copyDaily(){
  const d=state.daily,lines=[`[${d.date.replace(/-/g,'/')}] 일일 업무보고`,''];
  lines.push(['', ...d.projects.map(p=>p.name),'합 계'].join('\t'));
  const dT=d.projects.reduce((s,p)=>s+(parseFloat(p.dh)||0),0);
  lines.push(['일일',...d.projects.map(p=>`${p.dh||0}h`),`${dT}h`].join('\t'));
  const mT=d.projects.reduce((s,p)=>s+(parseFloat(p.mh)||0),0);
  lines.push(['월간',...d.projects.map(p=>`${p.mh||0}h`),`${mT}h`].join('\t'));
  lines.push('','시간\t업무 내용\t비고');
  for(const b of d.blocks){const h=calcH(b.start,b.end);const c=b.tasks.filter(t=>t.content).map(t=>`[${d.projects[t.pi]?.name||''}] ${t.content}`).join('\n');lines.push(`${b.start}~${b.end}(${h}h)\t${c}\t${b.note||''}`);}
  lines.push('','명일 진행 업무');
  d.tomorrow.filter(t=>t.content).forEach(t=>lines.push(`[${d.projects[t.pi]?.name||''}] ${t.content}`));
  flashCopy('copy-btn',lines.join('\n'));
}
function copyWeekly(){
  const w=state.weekly,lines=[`${w.weekLabel} 주간업무보고 전달드립니다. 감사합니다. 허보람 드림.`,'','----------------------------------------------------------------------'];
  for(const proj of w.projects||[]){lines.push('');let h=proj.name;if(proj.budget)h+=` (${proj.budget})`;if(proj.period)h+=` (${proj.period})`;lines.push(h);if(proj.members)lines.push(`  - ${proj.members}`);lines.push('');for(const sec of proj.sections||[]){lines.push(`* ${sec.title}`);sec.items.forEach(i=>{if(i.trim())lines.push(`- ${i}`);});}}
  flashCopy('wcopy-btn',lines.join('\n'));
}
function flashCopy(id,text){
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById(id),orig=btn.textContent;
    btn.textContent='✓ 복사 완료!';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent=orig;btn.classList.remove('copied');},2500);
  }).catch(()=>toast('복사 실패',true));
}

/* ── Excel ── */
function exportDailyExcel(){

  rows.push(['구분',...d.projects.map(p=>p.name),'합 계']);
  const dT=d.projects.reduce((s,p)=>s+(parseFloat(p.dh)||0),0);rows.push(['일일',...d.projects.map(p=>`${p.dh||0}h`),`${dT}h`]);
  const mT=d.projects.reduce((s,p)=>s+(parseFloat(p.mh)||0),0);rows.push(['월간',...d.projects.map(p=>`${p.mh||0}h`),`${mT}h`]);
  rows.push([]);rows.push(['시간','업무 내용','비고']);
  for(const b of d.blocks){const h=calcH(b.start,b.end);const c=b.tasks.filter(t=>t.content).map(t=>`[${d.projects[t.pi]?.name||''}] ${t.content}`).join('\n');rows.push([`${b.start}~${b.end}(${h}h)`,c,b.note||'']);}
  rows.push([]);rows.push(['명일 진행 업무']);merges.push({s:{r:rows.length-1,c:0},e:{r:rows.length-1,c:2}});
  d.tomorrow.filter(t=>t.content).forEach(t=>{rows.push([`[${d.projects[t.pi]?.name||''}] ${t.content}`]);merges.push({s:{r:rows.length-1,c:0},e:{r:rows.length-1,c:2}});});
  const ws=XLSX.utils.aoa_to_sheet(rows);ws['!merges']=merges;ws['!cols']=[{wch:22},...d.projects.map(()=>({wch:16})),{wch:12},{wch:20}];
  XLSX.utils.book_append_sheet(wb,ws,'일일보고');XLSX.writeFile(wb,`일일보고_${d.date}.xlsx`);
}
function exportWeeklyExcel(){
  const w=state.weekly,wb=XLSX.utils.book_new(),rows=[],merges=[];
  rows.push([`${w.weekLabel} 주간업무보고`]);merges.push({s:{r:0,c:0},e:{r:0,c:1}});rows.push(['담당자','허보람 차장']);rows.push([]);
  for(const proj of w.projects||[]){const h=[proj.name,proj.budget?`예산: ${proj.budget}`:'',proj.period?`기간: ${proj.period}`:''].filter(Boolean).join('  |  ');rows.push([h]);merges.push({s:{r:rows.length-1,c:0},e:{r:rows.length-1,c:1}});if(proj.members)rows.push(['담당자',proj.members]);rows.push([]);for(const sec of proj.sections||[]){rows.push([`* ${sec.title}`]);merges.push({s:{r:rows.length-1,c:0},e:{r:rows.length-1,c:1}});sec.items.forEach(item=>{if(item.trim())rows.push(['',`- ${item}`]);});rows.push([]);}rows.push(['─────────────────────────────────']);merges.push({s:{r:rows.length-1,c:0},e:{r:rows.length-1,c:1}});rows.push([]);}
  const ws=XLSX.utils.aoa_to_sheet(rows);ws['!merges']=merges;ws['!cols']=[{wch:12},{wch:72}];
  XLSX.utils.book_append_sheet(wb,ws,'주간보고');XLSX.writeFile(wb,`주간보고_${w.weekLabel||'미입력'}.xlsx`);
}
function exportTrackExcel(){
  const {y,m}=trackYM,prefix=`${y}-${String(m+1).padStart(2,'0')}`;
  const dayRecs=state.dailyH.filter(r=>r.date.startsWith(prefix));
  if(!dayRecs.length){toast('이 달 저장된 기록이 없습니다',true);return;}
  const wb=XLSX.utils.book_new(),projMap={};
  dayRecs.forEach(r=>r.projects.forEach(p=>{if(!projMap[p.name])projMap[p.name]=0;projMap[p.name]+=parseFloat(p.dh)||0;}));
  const totalH=dayRecs.reduce((s,r)=>s+totalDH(r),0);
  const s1=[[ `${y}년 ${m+1}월 근무시간 요약`],[],['근무 기록일',dayRecs.length+'일'],['총 근무시간',totalH+'h'],['일 평균',(dayRecs.length?Math.round(totalH/dayRecs.length*10)/10:0)+'h'],[],['프로젝트','총 시간'],...Object.entries(projMap).sort((a,b)=>b[1]-a[1]).map(([n,h])=>[n,h+'h'])];
  const ws1=XLSX.utils.aoa_to_sheet(s1);ws1['!cols']=[{wch:20},{wch:16}];XLSX.utils.book_append_sheet(wb,ws1,'월간요약');
  const s2=[['날짜','프로젝트','일일합계','시간대','업무 내용','비고']];
  dayRecs.forEach(r=>{let first=true;r.blocks.forEach(b=>{const h=calcH(b.start,b.end),ts=`${b.start}~${b.end}(${h}h)`;b.tasks.filter(t=>t.content).forEach(t=>{s2.push([first?r.date:'',r.projects[t.pi]?.name||'',first?totalDH(r)+'h':'',ts,t.content,b.note||'']);first=false;});});});
  const ws2=XLSX.utils.aoa_to_sheet(s2);ws2['!cols']=[{wch:14},{wch:20},{wch:10},{wch:20},{wch:40},{wch:16}];XLSX.utils.book_append_sheet(wb,ws2,'일별상세');
  XLSX.writeFile(wb,`근무시간_${y}년${m+1}월.xlsx`);
}

state.daily.date = new Date().toISOString().split('T')[0];
renderDaily();
renderWeekly();

  setSyncStatus('ing');
  loadFromSheets();
}
