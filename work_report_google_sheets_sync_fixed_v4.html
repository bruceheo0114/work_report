<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무보고 작성기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','맑은 고딕','Apple SD Gothic Neo',sans-serif;background:#F4F3EF;color:#1A2744;min-height:100vh}
header{background:#1A2744;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(26,39,68,.25)}
.header-inner{max-width:1000px;margin:0 auto;padding:0 20px;height:54px;display:flex;align-items:center;justify-content:space-between}
.logo{color:#fff;font-size:18px;font-weight:800;letter-spacing:-.5px}
.logo span{color:#E8704A;margin-right:6px}
.sync-badge{font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;cursor:default}
.sync-ok{background:#1f3d2a;color:#4ade80}
.sync-err{background:#3d1f1f;color:#f87171}
.sync-ing{background:#1f2d3d;color:#93c5fd}
.sync-none{background:#2d2a1f;color:#fbbf24}
.tabs{display:flex;gap:4px}
.tab{background:transparent;border:none;padding:8px 14px;border-radius:6px;color:rgba(255,255,255,.4);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.tab.active{background:#E8704A;color:#fff}
.tab:hover:not(.active){color:rgba(255,255,255,.75)}
main{max-width:1000px;margin:0 auto;padding:24px 16px 60px}
.section{display:flex;flex-direction:column;gap:16px}
.hidden{display:none}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;flex-wrap:wrap;gap:10px}
.page-title{font-size:22px;font-weight:800;letter-spacing:-.5px}
.action-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

/* Buttons */
.btn{border:none;border-radius:8px;padding:9px 18px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-navy{background:#1A2744;color:#fff}.btn-navy:hover{background:#2a3d6b}
.btn-green{background:#217346;color:#fff}.btn-green:hover{background:#1a5c38}
.btn-save{background:#2E7D4F;color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-save:hover{background:#236039}
.btn-copy{background:#1A2744;color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-copy.copied{background:#2E7D4F}
.btn-sm{background:transparent;color:#bbb;border:none;cursor:pointer;font-size:14px;padding:2px 5px;border-radius:4px;font-weight:700;font-family:inherit}
.btn-sm:hover{color:#E8704A}
.btn-sm-o{background:transparent;color:#bbb;border:1px solid #ddd;cursor:pointer;font-size:11px;padding:3px 8px;border-radius:5px;font-weight:600;font-family:inherit}
.btn-sm-o:hover{color:#E8704A;border-color:#E8704A}
.btn-rm{background:transparent;color:#E8704A;border:1px solid #E8704A;cursor:pointer;font-size:12px;padding:4px 10px;border-radius:6px;font-weight:700;font-family:inherit}
.btn-rm:hover{background:#fff5f2}
.btn-dash{background:transparent;color:#E8704A;border:1.5px dashed #E8C4B8;border-radius:6px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;margin-top:8px;font-family:inherit;display:inline-block}
.btn-dash:hover{background:#fff5f2}
.btn-dash.navy{border-color:#9aadce;color:#1A2744}.btn-dash.navy:hover{background:#f0f4fb}
.btn-block-add{background:#1A2744;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:13px;cursor:pointer;font-weight:700;margin-top:10px;font-family:inherit}
.btn-full{background:#1A2744;color:#fff;border:none;border-radius:10px;padding:14px 24px;font-size:15px;cursor:pointer;font-weight:700;width:100%;font-family:inherit}
.btn-full:hover{background:#2a3d6b}

/* Card */
.card{background:#fff;border-radius:12px;box-shadow:0 1px 6px rgba(26,39,68,.07);overflow:hidden}
.card-label{padding:12px 20px 10px;font-size:11px;font-weight:800;color:#999;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid #EEECE6;display:flex;align-items:center;justify-content:space-between}
.card-body{padding:20px}

/* Inputs */
.date-input{border:1.5px solid #D4D1C8;border-radius:8px;padding:7px 10px;font-size:14px;background:#fff;color:#1A2744;outline:none;font-family:inherit}
.th-input{border:none;background:transparent;text-align:center;font-weight:700;font-size:13px;outline:none;color:#1A2744;font-family:inherit;width:100%}
.num-input{width:50px;border:none;border-bottom:1.5px solid #C8C5BC;text-align:center;font-size:14px;outline:none;background:transparent;color:#1A2744;padding:2px 0;font-family:inherit}
.h-unit{font-size:12px;color:#999;margin-left:2px}
.total-cell{font-weight:800;color:#E8704A;font-size:15px}
.auto-cell{font-size:13px;color:#666;background:#F8F7F3}
.time-in{border:1.5px solid #D4D1C8;border-radius:6px;padding:5px 8px;font-size:14px;background:#fff;color:#1A2744;outline:none;font-family:inherit;width:125px}
.note-in,.task-in,.item-in,.meta-in,.wide-in{border:1.5px solid #D4D1C8;border-radius:6px;padding:6px 10px;font-size:13px;background:#fff;color:#1A2744;outline:none;font-family:inherit}
.note-in{flex:1;min-width:150px;color:#666}
.task-in,.item-in{flex:1}
.meta-in{width:160px}
.wide-in{width:100%;display:block}
.proj-name-in{border:none;background:transparent;font-weight:800;font-size:14px;color:#1A2744;outline:none;font-family:inherit;flex:1;min-width:0}
.sec-title-in{border:none;background:transparent;font-weight:700;font-size:14px;color:#1A2744;outline:none;flex:1;font-family:inherit}
.proj-sel{border:1.5px solid #D4D1C8;border-radius:6px;padding:5px 8px;font-size:13px;background:#fff;color:#1A2744;outline:none;min-width:135px;cursor:pointer;font-family:inherit}
input:focus,select:focus{border-color:#1A2744!important}

/* Tables */
.proj-table{border-collapse:collapse;width:100%;font-size:14px;min-width:400px}
.proj-table th{background:#F4F3EF;padding:9px 12px;text-align:center;font-weight:700;border:1px solid #E4E2DA;font-size:13px}
.proj-table td{padding:8px 12px;text-align:center;border:1px solid #E4E2DA}

/* Blocks */
.block{background:#FAFAF8;border-radius:8px;padding:14px;border:1px solid #E8E6DF}
.block-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.time-group{display:flex;align-items:center;gap:4px}
.tilde{color:#aaa;font-weight:700;margin:0 2px}
.h-chip{background:#E8704A;color:#fff;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:800}
.task-list{display:flex;flex-direction:column;gap:6px}
.task-row,.item-row{display:flex;gap:8px;align-items:center}
.item-dash{color:#aaa;font-size:12px;flex-shrink:0}

/* Weekly */
.sec-block{background:#F8F7F3;border-radius:8px;padding:12px 14px;border-left:3px solid #1A2744;margin-bottom:10px}
.sec-head{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.sec-star{color:#E8704A;font-weight:900;font-size:16px;flex-shrink:0}
.meta-row{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.meta-lbl{font-size:12px;color:#888;font-weight:700;flex-shrink:0}

/* Tracking */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:12px;padding:16px 20px;box-shadow:0 1px 6px rgba(26,39,68,.07);text-align:center}
.stat-val{font-size:28px;font-weight:800;color:#1A2744;letter-spacing:-.5px}
.stat-lbl{font-size:12px;color:#999;font-weight:600;margin-top:4px}
.stat-card.acc .stat-val{color:#E8704A}
.bar-chart{display:flex;flex-direction:column;gap:10px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-label{font-size:13px;font-weight:600;width:150px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;background:#F4F3EF;border-radius:4px;height:20px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:6px}
.bar-val{font-size:11px;font-weight:800;color:#fff;white-space:nowrap}

/* Week group in tracking */
.week-group{border-radius:12px;overflow:hidden;box-shadow:0 1px 6px rgba(26,39,68,.07)}
.week-header{background:#1A2744;color:#fff;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.week-header:hover{background:#2a3d6b}
.week-title{font-size:14px;font-weight:800}
.week-meta{font-size:12px;opacity:.7;display:flex;gap:12px}
.week-body{background:#fff;display:none}
.week-body.open{display:block}
.day-row{padding:12px 18px;border-bottom:1px solid #F0EEE8;cursor:pointer}
.day-row:last-child{border-bottom:none}
.day-row:hover{background:#FAFAF8}
.day-row-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.day-date{font-size:14px;font-weight:700}
.day-badges{display:flex;gap:6px;flex-wrap:wrap}
.day-detail{display:none;margin-top:8px;padding-top:8px;border-top:1px solid #F0EEE8}
.day-detail.open{display:block}
.weekly-linked{background:#EEF1F8;border-radius:8px;padding:12px 14px;margin-top:8px;border-left:3px solid #E8704A}
.weekly-linked-title{font-size:12px;font-weight:800;color:#E8704A;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}

/* Badges */
.badge{font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap}
.bd-o{background:#FFF0EC;color:#E8704A}
.bd-n{background:#EEF1F8;color:#1A2744}
.bd-g{background:#EDF7F2;color:#2E7D4F}

/* Misc */
.hist-list{display:flex;flex-direction:column;gap:8px}
.empty-state{text-align:center;padding:48px 20px;color:#bbb}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-text{font-size:16px;font-weight:600}
.empty-sub{font-size:13px;margin-top:6px}
.month-nav{display:flex;align-items:center;gap:8px}
.month-nav button{background:#fff;border:1.5px solid #D4D1C8;border-radius:6px;padding:6px 10px;cursor:pointer;font-size:14px;color:#1A2744;font-family:inherit}
.month-nav button:hover{background:#F4F3EF}
.month-label{font-size:16px;font-weight:800;min-width:90px;text-align:center}
.sec-title-trk{font-size:15px;font-weight:800;margin-bottom:10px}
.flex-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.overflow-x{overflow-x:auto}
.mt-6{margin-top:6px}
.auto-hint{font-size:11px;color:#aaa;margin-left:4px}
.info-box{background:#EEF1F8;border-radius:8px;padding:12px 16px;font-size:13px;color:#1A2744;margin-bottom:12px;line-height:1.6}

/* Toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1A2744;color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:700;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.2);transition:opacity .3s;pointer-events:none}
.toast.hide{opacity:0}
</style>
</head>
<body>
<div id="toast" class="toast hide"></div>

<header>
  <div class="header-inner">
    <div class="logo"><span>●</span>업무보고</div>
    <div style="display:flex;align-items:center;gap:10px">
      <span id="sync-badge" class="sync-badge sync-none">💾 로컬 저장</span>
      <button class="btn-sm-o" style="color:#fff;border-color:rgba(255,255,255,.35)" onclick="loadFromSheets(true)">시트 불러오기</button>
      <button class="btn-sm-o" style="color:#fff;border-color:rgba(255,255,255,.35)" onclick="syncStateToSheets('manual')">시트 업로드</button>
      <button class="btn-sm-o" style="color:#fff;border-color:rgba(255,255,255,.35)" onclick="testSheetsConnection()">연결 테스트</button>
      <div class="tabs">
        <button class="tab active" onclick="switchTab('daily')">일일 보고</button>
        <button class="tab" onclick="switchTab('weekly')">주간 보고</button>
        <button class="tab" onclick="switchTab('track')">📊 트래킹</button>
      </div>
    </div>
  </div>
</header>

<main>
  <div id="daily-section" class="section">
    <div class="page-header">
      <div class="page-title">일일 업무보고</div>
      <div class="action-bar">
        <input type="date" id="daily-date" class="date-input" onchange="onDateChange(this.value)">
        <button class="btn-copy" id="copy-btn" onclick="copyDaily()">📋 텍스트 복사</button>
        <button class="btn btn-green" onclick="exportDailyExcel()">📊 엑셀</button>
        <button class="btn-save" onclick="saveDailyRecord()">💾 기록 저장</button>
      </div>
    </div>
    <div id="daily-content"></div>
  </div>

  <div id="weekly-section" class="section hidden">
    <div class="page-header">
      <div class="page-title">주간 업무보고</div>
      <div class="action-bar">
        <button class="btn-copy" id="wcopy-btn" onclick="copyWeekly()">📋 텍스트 복사</button>
        <button class="btn btn-green" onclick="exportWeeklyExcel()">📊 엑셀</button>
        <button class="btn-save" onclick="saveWeeklyRecord()">💾 기록 저장</button>
      </div>
    </div>
    <div id="weekly-content"></div>
  </div>

  <div id="track-section" class="section hidden">
    <div class="page-header">
      <div class="page-title">기록 트래킹</div>
      <div class="action-bar">
        <button class="btn btn-green" onclick="exportTrackExcel()">📊 월간 엑셀</button>
      </div>
    </div>
    <div id="track-content"></div>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ▼▼▼ Google Sheets Apps Script URL 입력 ▼▼▼
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzh5oF4f5yAUOz1KBWrG10aB3VgnQqBTVXcEzpP0RvXSLZqCw9LlBZVLJFa5s82JlM-gw/exec';
// ▲▲▲ 예: 'https://script.google.com/macros/s/XXXXX/exec' ▲▲▲

/* ── State ── */
let _uid = 200;
const nid = () => ++_uid;

function toYMD(d){
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function dateObj(dateStr){
  const [y,m,d] = String(dateStr).split('-').map(Number);
  return new Date(y, (m||1)-1, d||1);
}
function todayStr(){
  // 한국 시간/사용자 로컬 시간 기준 날짜를 안전하게 반환합니다.
  // 기존 toISOString() 방식은 UTC 기준이라 한국 새벽 시간대에 전날로 저장될 수 있습니다.
  return toYMD(new Date());
}

function defaultDaily(){
  return {
    date: todayStr(),
    projects:[
      {id:1,name:'메타그린 슬림업',dh:0},
      {id:2,name:'메타그린 더블컷',dh:0}
    ],
    blocks:[
      {id:1,start:'09:30',end:'12:00',tasks:[{pi:0,content:''}],note:'점심 시간'},
      {id:2,start:'13:00',end:'18:30',tasks:[{pi:0,content:''},{pi:1,content:''}],note:''}
    ],
    tomorrow:[{pi:0,content:''},{pi:1,content:''}]
  };
}
function defaultWeekly(){ return {weekLabel:'',projects:[]}; }
function loadLS(k,fb){ try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;} }
function deepClone(v){ return JSON.parse(JSON.stringify(v)); }
function blankDailyFor(date, base){
  // 새 날짜를 열 때 이전 업무 내용을 그대로 가져오지 않도록 빈 일일 보고서를 생성합니다.
  // 단, 프로젝트명은 자주 반복 사용하므로 가능한 한 유지합니다.
  const d = defaultDaily();
  d.date = date;
  if(base?.projects?.length){
    d.projects = base.projects.map((p,i)=>({id:p.id||nid(), name:p.name||`프로젝트 ${i+1}`, dh:0}));
    const firstPis = d.projects.slice(0,2).map((_,i)=>({pi:i,content:''}));
    d.blocks = [
      {id:nid(),start:'09:30',end:'12:00',tasks:[{pi:0,content:''}],note:'점심 시간'},
      {id:nid(),start:'13:00',end:'18:30',tasks:firstPis.length?firstPis:[{pi:0,content:''}],note:''}
    ];
    d.tomorrow = firstPis.length?firstPis.map(t=>({pi:t.pi,content:''})):[{pi:0,content:''}];
  }
  return d;
}
function prepareDailyForDate(date){
  // 해당 날짜의 저장 기록이 있으면 우선 불러오고, 없으면 빈 양식으로 시작합니다.
  const existing = state.dailyH.find(r=>r.date===date);
  if(existing){
    state.daily = deepClone(existing);
  }else if(!state.daily || state.daily.date !== date){
    state.daily = blankDailyFor(date, state.daily);
  }
}

let state = {
  daily:   loadLS('wr-daily',  defaultDaily()),
  weekly:  loadLS('wr-weekly', defaultWeekly()),
  dailyH:  loadLS('wr-dailyH', []),
  weeklyH: loadLS('wr-weeklyH',[]),
};
let trackYM = {y:new Date().getFullYear(), m:new Date().getMonth()};

/* ── Helpers ── */
function calcH(s,e){
  if(!s||!e) return 0;
  const [sh,sm]=s.split(':').map(Number),[eh,em]=e.split(':').map(Number);
  const d=(eh*60+em)-(sh*60+sm);
  return d>0?Math.round(d/60*10)/10:0;
}
function esc(v){return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function totalDH(r){return r.projects.reduce((s,p)=>s+(parseFloat(p.dh)||0),0);}
const COLORS=['#E8704A','#1A2744','#2E7D6F','#7B68EE','#D4A017','#4A7C8A'];
const projColor=i=>COLORS[i%COLORS.length];

// 날짜에서 주 시작(월요일) 구하기
function weekStart(dateStr){
  const d=dateObj(dateStr);
  const day=d.getDay()||7;
  d.setDate(d.getDate()-day+1);
  return toYMD(d);
}
function weekEnd(dateStr){
  const d=dateObj(weekStart(dateStr));
  d.setDate(d.getDate()+6);
  return toYMD(d);
}
function fmtDate(s){ return s.replace(/-/g,'/'); }
function dateToWeekLabel(dateStr){
  const ws=weekStart(dateStr);
  return fmtDate(ws.slice(5)); // "04/28"
}

// 특정 달의 월간 누적 시간 계산
function calcMonthly(projName, dateStr){
  const prefix=dateStr.slice(0,7);
  return state.dailyH
    .filter(r=>r.date.startsWith(prefix))
    .reduce((s,r)=>{
      const p=r.projects.find(p=>p.name===projName);
      return s+(p?parseFloat(p.dh)||0:0);
    },0);
}

/* ── Toast ── */
let _toastT;
function toast(msg,err){
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.background=err?'#c0392b':'#1A2744';
  el.classList.remove('hide'); clearTimeout(_toastT);
  _toastT=setTimeout(()=>el.classList.add('hide'),2800);
}

/* ── Google Sheets Sync ──
   구조 요약
   - 입력 중에는 localStorage에 즉시 저장합니다.
   - 시트 저장/불러오기는 JSONP(GET) 우선 방식으로 처리합니다.
   - GitHub Pages → Apps Script는 일반 fetch(GET/POST)가 CORS/권한/리다이렉트에 막히는 경우가 많습니다.
   - 그래서 저장도 가능한 경우 JSONP save_state로 처리하고, payload가 너무 커질 때만 no-cors POST를 보조로 사용합니다.
*/
function setSyncStatus(s){
  const el=document.getElementById('sync-badge');
  const map={
    ok:['sync-ok','✅ 시트 저장 확인'],
    sent:['sync-ok','✅ 시트 전송 요청'],
    pending:['sync-none','⏳ 시트 확인 대기'],
    err:['sync-err','❌ 연동 오류'],
    ing:['sync-ing','🔄 동기화 중'],
    none:['sync-none','💾 로컬 저장']
  };
  const [cls,txt]=map[s]||map.none;
  el.className='sync-badge '+cls; el.textContent=txt;
}
function makeSyncId(){ return 'wr_'+Date.now()+'_'+Math.random().toString(36).slice(2,8); }
function cloudPayload(reason, syncId){
  return {
    action:'save_state',
    app:'work_report',
    version:'v4',
    reason:reason||'manual',
    syncId:syncId||makeSyncId(),
    clientUpdatedAt:new Date().toISOString(),
    daily:deepClone(state.daily),
    weekly:deepClone(state.weekly),
    dailyH:deepClone(state.dailyH||[]),
    weeklyH:deepClone(state.weeklyH||[])
  };
}
function applyCloudData(data){
  if(!data) return false;
  if(data.current?.daily)  state.daily  = data.current.daily;
  if(data.current?.weekly) state.weekly = data.current.weekly;
  if(Array.isArray(data.dailyH))  state.dailyH = data.dailyH;
  if(Array.isArray(data.weeklyH)) state.weeklyH = data.weeklyH;
  prepareDailyForDate(state.daily?.date || todayStr());
  saveLS();
  renderDaily();
  renderWeekly();
  if(!document.getElementById('track-section').classList.contains('hidden')) renderTrack();
  return true;
}
function jsonpRequest(action, payload){
  return new Promise((resolve,reject)=>{
    if(!SCRIPT_URL){ reject(new Error('SCRIPT_URL 없음')); return; }

    const cb='wr_cb_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);
    const params = new URLSearchParams();
    params.set('action', action || 'load');
    params.set('callback', cb);
    params.set('_', String(Date.now()));
    if(payload !== undefined && payload !== null){
      params.set('payload', JSON.stringify(payload));
    }

    const sep=SCRIPT_URL.includes('?')?'&':'?';
    const url=SCRIPT_URL+sep+params.toString();

    // Apps Script/브라우저 환경에서 URL이 너무 길면 JSONP 저장이 실패할 수 있어 사전에 차단합니다.
    // 이 경우 아래 syncStateToSheets에서 no-cors POST 보조 경로로 넘어갑니다.
    if(url.length > 45000){
      reject(new Error('JSONP URL이 너무 깁니다. POST 보조 경로로 전환합니다.'));
      return;
    }

    const script=document.createElement('script');
    let done=false;
    const cleanup=()=>{ try{delete window[cb];}catch(e){window[cb]=undefined;} script.remove(); };
    const timer=setTimeout(()=>{
      if(done) return; done=true; cleanup(); reject(new Error('시트 응답 시간 초과'));
    },20000);
    window[cb]=(data)=>{
      if(done) return; done=true; clearTimeout(timer); cleanup(); resolve(data);
    };
    script.onerror=()=>{
      if(done) return; done=true; clearTimeout(timer); cleanup(); reject(new Error('JSONP 로드 실패'));
    };
    script.src=url;
    document.body.appendChild(script);
  });
}
async function apiPost(body){
  if(!SCRIPT_URL) return false;
  try{
    await fetch(SCRIPT_URL,{
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify(body)
    });
    setSyncStatus('sent');
    return true;
  }catch(e){
    console.error('[Sheets POST 실패]', e);
    setSyncStatus('err');
    return false;
  }
}
async function syncStateToSheets(reason){
  if(!SCRIPT_URL){ toast('SCRIPT_URL이 비어 있습니다',true); return false; }
  saveLS();
  setSyncStatus('ing');

  const syncId=makeSyncId();
  const payload=cloudPayload(reason||'manual', syncId);

  // 1차: JSONP 저장. GitHub Pages에서 CORS/리다이렉트 이슈가 가장 적습니다.
  try{
    const saved=await jsonpRequest('save_state', payload);
    if(saved?.ok===false) throw new Error(saved.error||'Apps Script 저장 오류');
    if(saved?.meta?.lastSyncId===syncId || saved?.syncId===syncId){
      applyCloudData(saved);
      setSyncStatus('ok');
      toast('✅ Google Sheets 저장까지 확인했습니다');
      return true;
    }
  }catch(e){
    console.warn('[JSONP 저장 실패 → POST 보조 시도]', e);
  }

  // 2차: payload가 길거나 JSONP 저장이 막힐 때 no-cors POST로 전송합니다.
  // 단, 이 방식은 브라우저가 응답을 읽을 수 없으므로 이후 load로 확인합니다.
  const posted=await apiPost(payload);
  if(!posted){
    toast('시트 전송에 실패했습니다. 로컬에는 저장되어 있습니다.',true);
    return false;
  }

  try{
    const data=await jsonpRequest('load');
    if(data?.ok===false) throw new Error(data.error||'Apps Script 조회 오류');
    if(data?.meta?.lastSyncId===syncId){
      applyCloudData(data);
      setSyncStatus('ok');
      toast('✅ Google Sheets 저장까지 확인했습니다');
      return true;
    }
    setSyncStatus('pending');
    toast('시트 전송은 요청했습니다. 저장 확인은 시트에서 한 번 확인해주세요.');
    return true;
  }catch(e){
    console.warn('[Sheets 확인 실패]', e);
    setSyncStatus('pending');
    toast('시트 전송 요청 완료. 확인 조회는 실패했지만 로컬에는 저장되어 있습니다.');
    return true;
  }
}
async function loadFromSheets(manual=false){
  if(!SCRIPT_URL) return false;
  setSyncStatus('ing');
  try{
    const data=await jsonpRequest('load');
    if(data?.ok===false) throw new Error(data.error||'Apps Script 오류');
    applyCloudData(data);
    setSyncStatus('ok');

    const sheetUrl=data?.meta?.spreadsheetUrl || data?.spreadsheet?.url;
    toast(sheetUrl ? '✅ Google Sheets에서 불러왔습니다' : '✅ Google Sheets에서 불러왔습니다');
    return true;
  }catch(e){
    console.error('[Sheets 불러오기 실패]', e);
    setSyncStatus('err');
    if(manual) toast('시트 불러오기에 실패했습니다. Apps Script 배포/권한/URL 또는 SPREADSHEET_ID를 확인해주세요.', true);
    return false;
  }
}
async function testSheetsConnection(){
  if(!SCRIPT_URL){ toast('SCRIPT_URL이 비어 있습니다',true); return false; }
  setSyncStatus('ing');
  try{
    const data=await jsonpRequest('ping');
    if(data?.ok===false) throw new Error(data.error||'Apps Script 오류');
    setSyncStatus('ok');
    toast('✅ Apps Script 연결 성공');
    console.log('[Apps Script 연결 정보]', data);
    return true;
  }catch(e){
    console.error('[Apps Script 연결 실패]', e);
    setSyncStatus('err');
    toast('연결 테스트 실패: 배포 권한, URL, 스프레드시트 ID를 확인해주세요.', true);
    return false;
  }
}

    <th style="min-width:120px">

        const savedMH=calcMonthly(p.name, d.date);
        const existsToday=state.dailyH.find(r=>r.date===d.date);
        const todayInSaved=existsToday?.projects.find(sp=>sp.name===p.name);
        const mh=Math.round((savedMH-(todayInSaved?parseFloat(todayInSaved.dh)||0:0)+(parseFloat(p.dh)||0))*10)/10;
        return `<td class="auto-cell">${mh}h<span class="auto-hint">자동</span></td>`;
      }).join('');
      const mTotal=d.projects.reduce((s,p,i)=>{
        const savedMH=calcMonthly(p.name, d.date);
        const existsToday=state.dailyH.find(r=>r.date===d.date);
        const todayInSaved=existsToday?.projects.find(sp=>sp.name===p.name);
        return s+Math.round((savedMH-(todayInSaved?parseFloat(todayInSaved.dh)||0:0)+(parseFloat(p.dh)||0))*10)/10;
      },0);
      return `<tr><td style="font-weight:700">${label}</td>${cells}<td class="total-cell">${Math.round(mTotal*10)/10}h</td></tr>`;
    }
    const total=d.projects.reduce((s,p)=>s+(parseFloat(p[key])||0),0);
    const cells=d.projects.map((p,i)=>`
      <td>
        <input class="num-input" type="number" min="0" step="0.5" value="${p[key]||0}"
          oninput="state.daily.projects[${i}].${key}=parseFloat(this.value)||0;updateTotals('${key}');saveLS()">

  };

  const opts=selPi=>d.projects.map((p,pi)=>`<option value="${pi}"${selPi===pi?' selected':''}>${esc(p.name)}</option>`).join('');

  const blocksHtml=d.blocks.map((b,bi)=>{
    const h=calcH(b.start,b.end);
    const tasks=b.tasks.map((t,ti)=>`
      <div class="task-row">
        <select class="proj-sel" onchange="state.daily.blocks[${bi}].tasks[${ti}].pi=parseInt(this.value);saveLS()">${opts(t.pi)}</select>
        <input class="task-in" placeholder="업무 내용" value="${esc(t.content)}"
          oninput="state.daily.blocks[${bi}].tasks[${ti}].content=this.value;saveLS()">
        <button class="btn-sm" onclick="removeTask(${bi},${ti})">×</button>
      </div>`).join('');
    return `
      <div class="block">
        <div class="block-top">
          <div class="time-group">
            <input type="time" class="time-in" value="${b.start}"
              onchange="state.daily.blocks[${bi}].start=this.value;saveLS();updateChip(${bi})">
            <span class="tilde">~</span>
            <input type="time" class="time-in" value="${b.end}"
              onchange="state.daily.blocks[${bi}].end=this.value;saveLS();updateChip(${bi})">
            <span class="h-chip${h===0?' hidden':''}" id="chip-${bi}">${h>0?h+'h':''}</span>
          </div>
          <input class="note-in" placeholder="비고 (점심 시간 등)" value="${esc(b.note)}"
            oninput="state.daily.blocks[${bi}].note=this.value;saveLS()">
          <button class="btn-sm-o" onclick="removeBlock(${bi})">× 삭제</button>
        </div>
        <div class="task-list">${tasks}</div>
        <button class="btn-dash" onclick="addTask(${bi})">+ 업무 항목 추가</button>
      </div>`;
  }).join('');

  const tmrHtml=d.tomorrow.map((t,i)=>`
    <div class="task-row">
      <select class="proj-sel" onchange="state.daily.tomorrow[${i}].pi=parseInt(this.value);saveLS()">${opts(t.pi)}</select>
      <input class="task-in" placeholder="내일 진행할 업무" value="${esc(t.content)}"
        oninput="state.daily.tomorrow[${i}].content=this.value;saveLS()">
      <button class="btn-sm" onclick="removeTmr(${i})">×</button>
    </div>`).join('');

  const dTotal=d.projects.reduce((s,p)=>s+(parseFloat(p.dh)||0),0);

  document.getElementById('daily-content').innerHTML=`
    <div class="info-box">💡 <strong>월간 시간은 자동 계산</strong>됩니다. 일일 시간 입력 후 <strong>💾 기록 저장</strong>을 누르면 월간 합계에 누적됩니다.</div>
    <div class="card">
      <div class="card-label"><span>프로젝트별 근무시간</span>
        <button class="btn btn-navy" style="padding:5px 12px;font-size:12px" onclick="addProject()">+ 프로젝트 추가</button>
      </div>
      <div class="card-body overflow-x">
        <table class="proj-table">
          <thead><tr><th style="min-width:60px">구분</th>${projCols}<th style="color:#E8704A;min-width:70px">합 계</th></tr></thead>
          <tbody>${makeRow('일일','dh')}${makeRow('월간','mh')}</tbody>
        </table>
      </div>
    </div>
    <div class="card">
      <div class="card-label"><span>⏱ 시간대별 업무내용</span></div>
      <div class="card-body">
        <div style="display:flex;flex-direction:column;gap:10px">${blocksHtml}</div>
        <button class="btn-block-add" onclick="addBlock()">+ 시간대 추가</button>
      </div>
    </div>
    <div class="card">
      <div class="card-label"><span>📋 명일 진행 업무</span></div>
      <div class="card-body">
        <div style="display:flex;flex-direction:column;gap:8px">${tmrHtml}</div>
        <button class="btn-dash" onclick="addTmr()">+ 업무 추가</button>
      </div>
    </div>`;
}

function updateChip(bi){
  const b=state.daily.blocks[bi],h=calcH(b.start,b.end),el=document.getElementById('chip-'+bi);
  if(!el)return; if(h>0){el.textContent=h+'h';el.classList.remove('hidden');}else el.classList.add('hidden');
}
function updateTotals(key){
  const tot=state.daily.projects.reduce((s,p)=>s+(parseFloat(p[key])||0),0);
  const el=document.getElementById('tot-'+key); if(el) el.textContent=tot+'h';
}
function addProject(){state.daily.projects.push({id:nid(),name:'새 프로젝트',dh:0});saveLS();renderDaily();}
function removeProject(i){
  state.daily.projects.splice(i,1);
  state.daily.blocks.forEach(b=>b.tasks.forEach(t=>{if(t.pi>=i)t.pi=Math.max(0,t.pi-1);}));
  state.daily.tomorrow.forEach(t=>{if(t.pi>=i)t.pi=Math.max(0,t.pi-1);});
  saveLS();renderDaily();
}
function addBlock(){state.daily.blocks.push({id:nid(),start:'',end:'',tasks:[{pi:0,content:''}],note:''});saveLS();renderDaily();}
function removeBlock(i){state.daily.blocks.splice(i,1);saveLS();renderDaily();}
function addTask(bi){state.daily.blocks[bi].tasks.push({pi:0,content:''});saveLS();renderDaily();}
function removeTask(bi,ti){state.daily.blocks[bi].tasks.splice(ti,1);saveLS();renderDaily();}
function addTmr(){state.daily.tomorrow.push({pi:0,content:''});saveLS();renderDaily();}
function removeTmr(i){state.daily.tomorrow.splice(i,1);saveLS();renderDaily();}

            <span class="meta-lbl">기간</span>

              oninput="state.weekly.projects[${pi}].period=this.value;saveLS()">

          </div>
          ${secs}

  document.getElementById('weekly-content').innerHTML=`
    <div class="card">

    (state.weekly.projects=state.weekly.projects||[]).push({
      id:nid(),name,budget:'',period:'',members:'',
      sections:[{id:nid(),title:'KOL',items:['']},{id:nid(),title:'바이럴',items:['']}]

}

/* ── Save Records (버튼 눌렀을 때만 Sheets 동기화) ── */
async function saveDailyRecord(){
  const d=deepClone(state.daily);
  const idx=state.dailyH.findIndex(r=>r.date===d.date);
  if(idx>=0) state.dailyH[idx]=d;
  else{ state.dailyH.push(d); state.dailyH.sort((a,b)=>a.date<b.date?1:-1); }
  saveLS();
  renderDaily(); // 월간 자동 계산 업데이트
  toast(`✅ ${d.date} 로컬 저장 완료. 시트 동기화 중...`);
  await syncStateToSheets('save_daily_record');
}

async function saveWeeklyRecord(){
  const w=deepClone(state.weekly);
  if(!w.weekLabel.trim()){toast('주차 정보를 먼저 입력해주세요',true);return;}
  const idx=state.weeklyH.findIndex(r=>r.weekLabel===w.weekLabel);
  if(idx>=0){ if(!confirm(`"${w.weekLabel}" 기록이 이미 있습니다. 덮어쓰시겠습니까?`))return; state.weeklyH[idx]=w; }
  else state.weeklyH.unshift(w);
  saveLS();
  toast(`✅ ${w.weekLabel} 주 주간보고 로컬 저장 완료. 시트 동기화 중...`);
  await syncStateToSheets('save_weekly_record');
}

/* ── Tracking ── */
function renderTrack(){
  const {y,m}=trackYM, monthName=`${y}년 ${m+1}월`;
  const prefix=`${y}-${String(m+1).padStart(2,'0')}`;
  const dayRecs=state.dailyH.filter(r=>r.date.startsWith(prefix));
  const totalH=dayRecs.reduce((s,r)=>s+totalDH(r),0);

  // 프로젝트별 누적
  const projMap={};
  dayRecs.forEach(r=>r.projects.forEach(p=>{if(!projMap[p.name])projMap[p.name]=0;projMap[p.name]+=parseFloat(p.dh)||0;}));
  const projEntries=Object.entries(projMap).sort((a,b)=>b[1]-a[1]);
  const maxPH=projEntries.length?projEntries[0][1]:1;

  const barChart=projEntries.length===0
    ?'<div style="color:#bbb;font-size:13px">이 달 저장된 기록이 없습니다</div>'
    :projEntries.map(([name,h],idx)=>{
      const pct=Math.round(h/maxPH*100),color=projColor(idx),label=`${Math.round(h*10)/10}h`;
      return `<div class="bar-row">
        <div class="bar-label" title="${esc(name)}">${esc(name)}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}">
          ${pct>20?`<span class="bar-val">${label}</span>`:''}
        </div></div>
        ${pct<=20?`<span style="font-size:12px;color:#666;font-weight:700;flex-shrink:0">${label}</span>`:''}
      </div>`;}).join('');

  // 주별 그룹핑
  const weekGroups={};
  dayRecs.forEach(r=>{
    const ws=weekStart(r.date);
    if(!weekGroups[ws]) weekGroups[ws]=[];
    weekGroups[ws].push(r);
  });

  const weekKeys=Object.keys(weekGroups).sort((a,b)=>a<b?1:-1);

  const weekGroupsHtml=weekKeys.length===0
    ?`<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">이 달 저장된 기록이 없습니다</div><div class="empty-sub">일일 보고 작성 후 <strong>💾 기록 저장</strong>을 눌러주세요</div></div>`
    :weekKeys.map(ws=>{
      const recs=weekGroups[ws];
      const we=weekEnd(ws);
      const weekH=recs.reduce((s,r)=>s+totalDH(r),0);
      const weekLabel=dateToWeekLabel(ws);
      const weeklyRec=state.weeklyH.find(w=>w.weekLabel===weekLabel||w.weekLabel===fmtDate(ws));

      const daysHtml=recs.map(r=>{
        const h=totalDH(r);
        const projBadges=r.projects.filter(p=>p.dh>0).map((p,i)=>`<span class="badge" style="background:${projColor(i)}22;color:${projColor(i)}">${esc(p.name)} ${p.dh}h</span>`).join('');
        const blockDetail=r.blocks.map(b=>{
          const bh=calcH(b.start,b.end);
          const tasks=b.tasks.filter(t=>t.content).map(t=>`[${r.projects[t.pi]?.name||''}] ${t.content}`).join(' / ');
          return tasks?`<div style="font-size:13px;color:#666;margin-left:8px">• ${b.start}~${b.end}(${bh}h) ${tasks}</div>`:'';
        }).join('');
        return `
          <div class="day-row" onclick="toggleDayDetail(this)">
            <div class="day-row-top">
              <div class="day-date">${r.date} (${['일','월','화','수','목','금','토'][dateObj(r.date).getDay()]})</div>
              <div class="day-badges"><span class="badge bd-o">총 ${h}h</span>${projBadges}</div>
            </div>
            <div class="day-detail">
              ${blockDetail||'<div style="color:#bbb;font-size:13px">업무 내용 없음</div>'}
              <div style="margin-top:8px;display:flex;gap:8px">
                <button class="btn btn-navy" style="padding:5px 10px;font-size:12px" onclick="event.stopPropagation();loadDailyRec('${r.date}')">불러오기</button>
                <button class="btn" style="padding:5px 10px;font-size:12px;background:#fdf2f2;color:#c0392b;border:1px solid #e8b0b0" onclick="event.stopPropagation();deleteDailyRec('${r.date}')">삭제</button>
              </div>
            </div>
          </div>`;
      }).join('');

      const weeklySection=weeklyRec?`
        <div style="padding:12px 18px;background:#FAFAF8;border-top:1px solid #EEECE6">
          <div class="weekly-linked">
            <div class="weekly-linked-title">📋 ${weeklyRec.weekLabel} 주 주간보고 연결됨</div>
            ${(weeklyRec.projects||[]).map(p=>`<div style="font-size:13px;font-weight:700;color:#1A2744;margin-top:6px">${esc(p.name)}</div>${(p.sections||[]).map(s=>`<div style="font-size:12px;color:#666;margin-left:10px">* ${esc(s.title)}: ${s.items.filter(i=>i.trim()).length}건</div>`).join('')}`).join('')}
            <button class="btn btn-navy" style="padding:5px 10px;font-size:12px;margin-top:8px" onclick="loadWeeklyRec('${esc(weeklyRec.weekLabel)}')">주간보고 불러오기</button>
          </div>
        </div>`
      :`<div style="padding:10px 18px;background:#FAFAF8;border-top:1px solid #EEECE6">
          <span style="font-size:13px;color:#bbb">이 주의 주간 보고가 없습니다</span>
          <button class="btn btn-navy" style="padding:4px 10px;font-size:12px;margin-left:8px" onclick="goWriteWeekly('${weekLabel}')">작성하러 가기</button>
        </div>`;

      return `
        <div class="week-group">
          <div class="week-header" onclick="toggleWeek(this)">
            <div class="week-title">📅 ${fmtDate(ws)} ~ ${fmtDate(we)} 주</div>
            <div class="week-meta">
              <span>${recs.length}일 기록</span>
              <span>총 ${Math.round(weekH*10)/10}h</span>
              ${weeklyRec?'<span style="color:#4ade80">📋 주간보고 있음</span>':'<span style="color:#fbbf24">주간보고 없음</span>'}
            </div>
          </div>
          <div class="week-body">
            ${daysHtml}
            ${weeklySection}
          </div>
        </div>`;
    }).join('');

  document.getElementById('track-content').innerHTML=`
    <div class="card">
      <div class="card-label"><span>📅 월간 요약</span></div>
      <div class="card-body">
        <div class="flex-row" style="margin-bottom:16px">
          <div class="month-nav">
            <button onclick="changeMonth(-1)">‹</button>
            <div class="month-label">${monthName}</div>
            <button onclick="changeMonth(1)">›</button>
          </div>
        </div>
        <div class="stats-grid">
          <div class="stat-card acc"><div class="stat-val">${dayRecs.length}</div><div class="stat-lbl">근무 기록일</div></div>
          <div class="stat-card"><div class="stat-val">${Math.round(totalH*10)/10}h</div><div class="stat-lbl">월 총 근무시간</div></div>
          <div class="stat-card"><div class="stat-val">${dayRecs.length>0?Math.round(totalH/dayRecs.length*10)/10:0}h</div><div class="stat-lbl">일 평균</div></div>
          <div class="stat-card"><div class="stat-val">${weekKeys.length}</div><div class="stat-lbl">주</div></div>
        </div>
        <div class="sec-title-trk">프로젝트별 누적 시간</div>
        <div class="bar-chart">${barChart}</div>
      </div>
    </div>
    <div class="card">
      <div class="card-label"><span>📆 주별 일일+주간 기록 (${monthName})</span></div>
      <div class="card-body" style="padding:12px">
        <div style="display:flex;flex-direction:column;gap:10px">${weekGroupsHtml}</div>
      </div>
    </div>`;
}

function toggleWeek(el){el.nextElementSibling.classList.toggle('open');}
function toggleDayDetail(el){el.querySelector('.day-detail').classList.toggle('open');}
function changeMonth(d){trackYM.m+=d;if(trackYM.m>11){trackYM.m=0;trackYM.y++;}if(trackYM.m<0){trackYM.m=11;trackYM.y--;}renderTrack();}

function loadDailyRec(date){
  const r=state.dailyH.find(r=>r.date===date);
  if(!r)return;
  state.daily=deepClone(r);
  saveLS();renderDaily();switchTab('daily');toast('✅ 일일 보고를 불러왔습니다');
}
function loadWeeklyRec(label){
  const r=state.weeklyH.find(r=>r.weekLabel===label);
  if(!r)return;
  state.weekly=deepClone(r);
  saveLS();renderWeekly();switchTab('weekly');toast('✅ 주간 보고를 불러왔습니다');
}
function goWriteWeekly(label){
  state.weekly.weekLabel=label;
  saveLS();renderWeekly();switchTab('weekly');
}
async function deleteDailyRec(date){
  if(!confirm(`${date} 기록을 삭제하시겠습니까?`))return;
  const i=state.dailyH.findIndex(r=>r.date===date);
  if(i>=0) state.dailyH.splice(i,1);
  saveLS();
  renderTrack();
  toast('🗑 로컬 기록 삭제 완료. 시트 동기화 중...');
  await syncStateToSheets('delete_daily_record');
}

/* ── Copy ── */
function copyDaily(){
  const d=state.daily,lines=[`[${d.date.replace(/-/g,'/')}] 일일 업무보고`,''];
  lines.push(['', ...d.projects.map(p=>p.name),'합 계'].join('\t'));
  const dT=d.projects.reduce((s,p)=>s+(parseFloat(p.dh)||0),0);
  lines.push(['일일',...d.projects.map(p=>`${p.dh||0}h`),`${dT}h`].join('\t'));
  // 월간 자동 계산값
  const mVals=d.projects.map(p=>{
    const savedMH=calcMonthly(p.name,d.date);
    const existsToday=state.dailyH.find(r=>r.date===d.date);
    const todayInSaved=existsToday?.projects.find(sp=>sp.name===p.name);
    return Math.round((savedMH-(todayInSaved?parseFloat(todayInSaved.dh)||0:0)+(parseFloat(p.dh)||0))*10)/10;
  });
  lines.push(['월간',...mVals.map(v=>`${v}h`),`${Math.round(mVals.reduce((s,v)=>s+v,0)*10)/10}h`].join('\t'));
  lines.push('','시간\t업무 내용\t비고');
  for(const b of d.blocks){const h=calcH(b.start,b.end);const c=b.tasks.filter(t=>t.content).map(t=>`[${d.projects[t.pi]?.name||''}] ${t.content}`).join('\n');lines.push(`${b.start}~${b.end}(${h}h)\t${c}\t${b.note||''}`);}
  lines.push('','명일 진행 업무');
  d.tomorrow.filter(t=>t.content).forEach(t=>lines.push(`[${d.projects[t.pi]?.name||''}] ${t.content}`));
  flashCopy('copy-btn',lines.join('\n'));
}
function copyWeekly(){
  const w=state.weekly,lines=[`${w.weekLabel} 주간업무보고 전달드립니다. 감사합니다. 허보람 드림.`,'','----------------------------------------------------------------------'];
  for(const proj of w.projects||[]){lines.push('');let h=proj.name;if(proj.budget)h+=` (${proj.budget})`;if(proj.period)h+=` (${proj.period})`;lines.push(h);if(proj.members)lines.push(`  - ${proj.members}`);lines.push('');for(const sec of proj.sections||[]){lines.push(`* ${sec.title}`);sec.items.forEach(i=>{if(i.trim())lines.push(`- ${i}`);});}}
  flashCopy('wcopy-btn',lines.join('\n'));
}
function flashCopy(id,text){
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById(id),orig=btn.textContent;
    btn.textContent='✓ 복사 완료!';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent=orig;btn.classList.remove('copied');},2500);
  }).catch(()=>toast('복사 실패',true));
}

/* ── Excel ── */
function exportDailyExcel(){
  const d=state.daily,wb=XLSX.utils.book_new(),rows=[],merges=[];
  rows.push([`일일 업무보고 — ${d.date.replace(/-/g,'/')}`]);merges.push({s:{r:0,c:0},e:{r:0,c:d.projects.length+1}});rows.push([]);
  rows.push(['구분',...d.projects.map(p=>p.name),'합 계']);
  const dT=d.projects.reduce((s,p)=>s+(parseFloat(p.dh)||0),0);rows.push(['일일',...d.projects.map(p=>`${p.dh||0}h`),`${dT}h`]);
  const mVals=d.projects.map(p=>{const s=calcMonthly(p.name,d.date);const et=state.dailyH.find(r=>r.date===d.date);const ts=et?.projects.find(sp=>sp.name===p.name);return Math.round((s-(ts?parseFloat(ts.dh)||0:0)+(parseFloat(p.dh)||0))*10)/10;});
  rows.push(['월간(자동)',...mVals.map(v=>`${v}h`),`${Math.round(mVals.reduce((s,v)=>s+v,0)*10)/10}h`]);
  rows.push([]);rows.push(['시간','업무 내용','비고']);
  for(const b of d.blocks){const h=calcH(b.start,b.end);const c=b.tasks.filter(t=>t.content).map(t=>`[${d.projects[t.pi]?.name||''}] ${t.content}`).join('\n');rows.push([`${b.start}~${b.end}(${h}h)`,c,b.note||'']);}
  rows.push([]);rows.push(['명일 진행 업무']);merges.push({s:{r:rows.length-1,c:0},e:{r:rows.length-1,c:2}});
  d.tomorrow.filter(t=>t.content).forEach(t=>{rows.push([`[${d.projects[t.pi]?.name||''}] ${t.content}`]);merges.push({s:{r:rows.length-1,c:0},e:{r:rows.length-1,c:2}});});
  const ws=XLSX.utils.aoa_to_sheet(rows);ws['!merges']=merges;ws['!cols']=[{wch:22},...d.projects.map(()=>({wch:16})),{wch:12},{wch:20}];
  XLSX.utils.book_append_sheet(wb,ws,'일일보고');XLSX.writeFile(wb,`일일보고_${d.date}.xlsx`);
}
function exportWeeklyExcel(){
  const w=state.weekly,wb=XLSX.utils.book_new(),rows=[],merges=[];
  rows.push([`${w.weekLabel} 주간업무보고`]);merges.push({s:{r:0,c:0},e:{r:0,c:1}});rows.push(['담당자','허보람 차장']);rows.push([]);
  for(const proj of w.projects||[]){const h=[proj.name,proj.budget?`예산: ${proj.budget}`:'',proj.period?`기간: ${proj.period}`:''].filter(Boolean).join('  |  ');rows.push([h]);merges.push({s:{r:rows.length-1,c:0},e:{r:rows.length-1,c:1}});if(proj.members)rows.push(['담당자',proj.members]);rows.push([]);for(const sec of proj.sections||[]){rows.push([`* ${sec.title}`]);merges.push({s:{r:rows.length-1,c:0},e:{r:rows.length-1,c:1}});sec.items.forEach(item=>{if(item.trim())rows.push(['',`- ${item}`]);});rows.push([]);}rows.push(['─────────────────────────────────']);merges.push({s:{r:rows.length-1,c:0},e:{r:rows.length-1,c:1}});rows.push([]);}
  const ws2=XLSX.utils.aoa_to_sheet(rows);ws2['!merges']=merges;ws2['!cols']=[{wch:12},{wch:72}];
  XLSX.utils.book_append_sheet(wb,ws2,'주간보고');XLSX.writeFile(wb,`주간보고_${w.weekLabel||'미입력'}.xlsx`);
}
function exportTrackExcel(){
  const {y,m}=trackYM,prefix=`${y}-${String(m+1).padStart(2,'0')}`;
  const dayRecs=state.dailyH.filter(r=>r.date.startsWith(prefix));
  if(!dayRecs.length){toast('이 달 저장된 기록이 없습니다',true);return;}
  const wb=XLSX.utils.book_new(),projMap={};
  dayRecs.forEach(r=>r.projects.forEach(p=>{if(!projMap[p.name])projMap[p.name]=0;projMap[p.name]+=parseFloat(p.dh)||0;}));
  const totalH=dayRecs.reduce((s,r)=>s+totalDH(r),0);
  const s1=[[`${y}년 ${m+1}월 근무시간 요약`],[],['근무 기록일',dayRecs.length+'일'],['총 근무시간',totalH+'h'],['일 평균',(dayRecs.length?Math.round(totalH/dayRecs.length*10)/10:0)+'h'],[],['프로젝트','총 시간'],...Object.entries(projMap).sort((a,b)=>b[1]-a[1]).map(([n,h])=>[n,h+'h'])];
  const ws1=XLSX.utils.aoa_to_sheet(s1);ws1['!cols']=[{wch:20},{wch:16}];XLSX.utils.book_append_sheet(wb,ws1,'월간요약');
  const s2=[['날짜','요일','프로젝트','일일합계','시간대','업무 내용','비고']];
  const days=['일','월','화','수','목','금','토'];
  dayRecs.forEach(r=>{let first=true;r.blocks.forEach(b=>{const h=calcH(b.start,b.end),ts=`${b.start}~${b.end}(${h}h)`;b.tasks.filter(t=>t.content).forEach(t=>{s2.push([first?r.date:'',first?days[dateObj(r.date).getDay()]:'',r.projects[t.pi]?.name||'',first?totalDH(r)+'h':'',ts,t.content,b.note||'']);first=false;});});});
  const ws2=XLSX.utils.aoa_to_sheet(s2);ws2['!cols']=[{wch:14},{wch:6},{wch:20},{wch:10},{wch:20},{wch:40},{wch:16}];XLSX.utils.book_append_sheet(wb,ws2,'일별상세');
  XLSX.writeFile(wb,`근무시간_${y}년${m+1}월.xlsx`);
}
